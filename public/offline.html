    <style>
        body {
            font-family: "Poppins", sans-serif;
            font-weight: 400;
            font-style: normal;
            font-size: 1rem;
        }

        .btn {
            display: inline-block;
            font-weight: 400;
            color: #212529;
            text-align: center;
            vertical-align: middle;
            user-select: none;
            background-color: transparent;
            border: 1px solid transparent;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            line-height: 1.5;
            border-radius: 0.25rem;
            transition:
                color 0.15s ease-in-out,
                background-color 0.15s ease-in-out,
                border-color 0.15s ease-in-out,
                box-shadow 0.15s ease-in-out;
        }

        .btn-danger {
            color: #fff;
            background-color: #dc3545;
            border-color: #dc3545;
            box-shadow: 2px 2px 0px #a17075;
        }

        .btn-block {
            display: block;
            width: 100%;
        }

        .lost-connection {
            display: block;
            position: relative;
            margin: 0;
            padding: 0;
            width: 100%;
        }

        .lost-connection .lost-connection-media,
        .lost-connection .lost-connection-title,
        .lost-connection .lost-connection-content {
            display: flex;
            justify-content: center;
            align-items: center;
            align-content: center;
        }

        .lost-connection .lost-connection-media {
            margin-top: 160px;
            margin-bottom: 32px;
        }

        .lost-connection .lost-connection-media img.img-lost-connection {
            width: auto;
            height: 242px;
        }

        .lost-connection .lost-connection-title {
            font-weight: 600;
            text-align: center;
        }

        .lost-connection .lost-connection-content {
            text-align: center;
        }

        .lost-connection .lost-connection-button-action {
            margin-top: 32px;
        }
    </style>

    <script>
        document.querySelector("button").addEventListener("click", () => {
            window.location.reload();
        });

        window.addEventListener('online', () => {
            window.location.reload();
        });

        async function checkNetworkAndReload() {
            try {
                const response = await fetch('/');
                if (response.status >= 200 && response.status < 500) {
                    window.location.reload();
                    return;
                }

            } catch (error) { }
            window.setTimeout(checkNetworkAndReload, 2500);
        }
        checkNetworkAndReload();
    </script>
